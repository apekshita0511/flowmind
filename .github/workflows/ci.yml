name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: flowmind_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: flowmind_backend/requirements.txt

      - name: Install dependencies
        run: |
          cd flowmind_backend
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowmind_test
          GROQ_API_KEY: test-key-ci
          SECRET_KEY: ci-secret-key-not-for-production
          DJANGO_SETTINGS_MODULE: flowmind_backend.settings
        run: |
          cd flowmind_backend
          python manage.py migrate

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowmind_test
          GROQ_API_KEY: test-key-ci
          SECRET_KEY: ci-secret-key-not-for-production
          DJANGO_SETTINGS_MODULE: flowmind_backend.settings
        run: |
          cd flowmind_backend
          python manage.py test tasks --verbosity=2
